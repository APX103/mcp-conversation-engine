# MCP Conversation Engine — Dual Instance Deployment
#
# Standalone:  docker network create shared-agent-net && docker compose up -d
# Combined:    ../start-shared.sh [--with-redis]

x-backend-common: &backend-common
  build: ./backend
  restart: unless-stopped
  environment:
    - MAX_TOOL_ROUNDS=100

services:
  # ── Instance A ──
  mongodb-a:
    image: mongo:8.2.7-noble
    volumes:
      - mongo-a-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared

  redis-a:
    image: redis:8.4.2-alpine3.22
    volumes:
      - redis-a-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared

  backend-a:
    <<: *backend-common
    ports:
      - "3000:3000"
      - "9990-9999:9990-9999"
    environment:
      - MAX_TOOL_ROUNDS=100
      - A2A_AGENT_URL=http://backend-a:3000
      - A2A_CENTER_URL=http://a2a-center:8888
    volumes:
      - ./config-a.json:/config.json:ro
    depends_on:
      mongodb-a:
        condition: service_healthy
      redis-a:
        condition: service_healthy
    networks:
      - default
      - shared

  frontend-a:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:3000"
    ports:
      - "5174:80"
    depends_on:
      - backend-a

  # ── Instance B ──
  mongodb-b:
    image: mongo:8.2.7-noble
    volumes:
      - mongo-b-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared

  redis-b:
    image: redis:8.4.2-alpine3.22
    volumes:
      - redis-b-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default
      - shared

  backend-b:
    <<: *backend-common
    ports:
      - "3001:3000"
      - "10000-10009:9990-9999"
    environment:
      - MAX_TOOL_ROUNDS=100
      - A2A_AGENT_URL=http://backend-b:3000
      - A2A_CENTER_URL=http://a2a-center:8888
    volumes:
      - ./config-b.json:/config.json:ro
    depends_on:
      mongodb-b:
        condition: service_healthy
      redis-b:
        condition: service_healthy
    networks:
      - default
      - shared

  frontend-b:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://localhost:3001"
    ports:
      - "5175:80"
    depends_on:
      - backend-b

volumes:
  mongo-a-data:
  mongo-b-data:
  redis-a-data:
  redis-b-data:

networks:
  default:
    name: mcp-conversation-engine_default
  shared:
    external: true
    name: shared-agent-net
